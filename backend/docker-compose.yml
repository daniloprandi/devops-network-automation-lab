version: "3.9"

services:
  backend:
    build: .
    container_name: devopsapp-backend
    expose:
      - "5000"
    restart: always

  nginx:
    image: nginx:latest
    container_name: devopsapp-nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
